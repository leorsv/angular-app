name: Sync Instructions

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6am UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Fetch latest Angular instructions
        run: |
          mkdir -p .github
          curl -fsSL https://raw.githubusercontent.com/leorsv/instructions-platform/main/instructions/angular.md \
            -o /tmp/angular.md

      - name: Write copilot-instructions.md
        run: |
          cat > .github/copilot-instructions.md <<EOF
          # Angular Project — Copilot Instructions

          > **Auto-synced from instructions-platform.**
          > Source: \`https://raw.githubusercontent.com/leorsv/instructions-platform/main/instructions/angular.md\`
          > Last synced: $(date -u +"%Y-%m-%d %H:%M UTC")

          ---

          EOF
          cat /tmp/angular.md >> .github/copilot-instructions.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/copilot-instructions.md
          git diff --cached --quiet || git commit -m "chore: sync instructions from instructions-platform"
          git push
